name: Build Multi-Arch Docker Image

# 定义触发条件：当 main 分支有 push 或者是发布 release 时触发
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # 镜像名称默认使用：ghcr.io/用户名/仓库名
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    # 设置权限，允许 Actions 读代码并写入 GitHub Packages
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 设置 QEMU：用于模拟不同的 CPU 架构环境
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. 设置 Buildx：Docker 的多架构构建工具
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录 GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. 提取元数据（用于自动生成 Tag 和 Label）
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # 自动生成标签：如果是 push 到 main，标签为 latest
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=semver,pattern={{version}}

      # 5. 执行多架构构建并推送
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          # 同时构建三个平台的镜像
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 开启缓存，让下次构建更快
          cache-from: type=gha
          cache-to: type=gha,mode=max
